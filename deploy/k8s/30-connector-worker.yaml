apiVersion: apps/v1
kind: Deployment
metadata:
  name: shieldnet-access-connector-worker
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: shieldnet-access
    app.kubernetes.io/component: access-connector-worker
    app.kubernetes.io/part-of: shieldnet-access
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shieldnet-access
      app.kubernetes.io/component: access-connector-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shieldnet-access
        app.kubernetes.io/component: access-connector-worker
    spec:
      serviceAccountName: shieldnet-access
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: access-connector-worker
          image: ghcr.io/kennguy3n/fishbone-access:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["access-connector-worker"]
          envFrom:
            - configMapRef:
                name: shieldnet-access-config
            - secretRef:
                name: shieldnet-access-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
