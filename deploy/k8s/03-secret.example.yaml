# SECRET TEMPLATE — copy, fill in REAL values, and apply (or replace with an
# ExternalSecrets/SealedSecrets-managed Secret of the same name). DO NOT commit
# real secret values. The placeholders below are intentionally non-functional.
#
# Generate keys:
#   ACCESS_KMS_MASTER_KEY / ACCESS_CREDENTIAL_DEK:  openssl rand -base64 32
#
# Required:
#   ACCESS_DATABASE_URL    Postgres DSN (carries the DB password).
#   one of ACCESS_KMS_MASTER_KEY / ACCESS_CREDENTIAL_DEK (workflow-engine
#   refuses to start without a credential key; connector secrets fail closed).
# Optional: ACCESS_REDIS_URL, IAM_CORE_CLIENT_SECRET, ACCESS_AI_AGENT_API_KEY,
#   AUTH_JWT_SECRET (non-prod only), PAM_SSH_HOST_KEY (set for a stable SSH
#   host-key fingerprint across pam-gateway replicas), PAM_SSH_CA_KEY.
apiVersion: v1
kind: Secret
metadata:
  name: shieldnet-access-secrets
  namespace: shieldnet-access
  labels:
    app.kubernetes.io/name: shieldnet-access
    app.kubernetes.io/part-of: shieldnet-access
type: Opaque
stringData:
  ACCESS_DATABASE_URL: "postgres://USER:PASSWORD@HOST:5432/shieldnet_access?sslmode=require"
  ACCESS_KMS_MASTER_KEY: "REPLACE_ME_BASE64_32_BYTE_KEY"
  # ACCESS_CREDENTIAL_DEK: "REPLACE_ME_BASE64_32_BYTE_KEY"
  # ACCESS_REDIS_URL: "redis://REPLACE_ME:6379/0"
  # IAM_CORE_CLIENT_SECRET: "REPLACE_ME"
  # ACCESS_AI_AGENT_API_KEY: "REPLACE_ME"
  # PAM_SSH_HOST_KEY: |
  #   -----BEGIN OPENSSH PRIVATE KEY-----
  #   ...
  #   -----END OPENSSH PRIVATE KEY-----
