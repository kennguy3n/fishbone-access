{{- if not .Values.secrets.existingSecret -}}
{{- /*
  Chart-managed Secret. Only emitted when secrets.existingSecret is unset.
  Keys are written only when they carry a value so an empty placeholder never
  shadows the in-binary "unset" behaviour. ACCESS_DATABASE_URL is derived from
  the bundled dev Postgres when that is enabled and no explicit DSN was given.
*/ -}}
{{- $dbUrl := .Values.secrets.databaseUrl -}}
{{- if and (not $dbUrl) .Values.postgres.enabled -}}
{{- $pg := .Values.postgres.auth -}}
{{- $dbUrl = printf "postgres://%s:%s@%s:%d/%s?sslmode=disable" $pg.username $pg.password (include "shieldnet-access.postgresName" .) (int .Values.postgres.service.port) $pg.database -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shieldnet-access.secretName" . }}
  labels:
    {{- include "shieldnet-access.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with $dbUrl }}
  ACCESS_DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.kmsMasterKey }}
  ACCESS_KMS_MASTER_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.credentialDek }}
  ACCESS_CREDENTIAL_DEK: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.redisUrl }}
  ACCESS_REDIS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.iamCoreClientSecret }}
  IAM_CORE_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.aiAgentApiKey }}
  ACCESS_AI_AGENT_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.authJwtSecret }}
  AUTH_JWT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.sshHostKey }}
  PAM_SSH_HOST_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.sshCaKey }}
  PAM_SSH_CA_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
