# golangci-lint v2.x configuration for fishbone-access (ShieldNet Access).
#
# Mirrors the lint policy of the reference implementation: the core
# high-signal linters plus forbidigo guarding against direct use of the
# standard library `log` emit functions (production code must use
# internal/pkg/logger, which is slog-backed and ctx-aware).
#
# This is a v2.x config — the schema differs from v1.x.
version: "2"

run:
  timeout: 5m
  go: "1.25"
  build-tags:
    - integration

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - forbidigo
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - staticcheck
    - unused

  settings:
    forbidigo:
      forbid:
        - pattern: ^log\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)$
          msg: "use logger.<Level>f(ctx, ...) from internal/pkg/logger instead of the std log package emit functions"
      analyze-types: true
    gosec:
      excludes:
        # G115 (integer-overflow conversion) — too noisy across int/uint
        # conversions; real overflows are caught by staticcheck SA4003.
        - G115
    errcheck:
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (net.Conn).Close
        - (net.Listener).Close
        - (*crypto/tls.Conn).Close
        - (net.Conn).SetReadDeadline
        - (net.Conn).SetWriteDeadline
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - ifElseChain
        - hugeParam
        - rangeValCopy
    govet:
      enable:
        - printf
        - structtag
        - assign
        - atomic
        - bools
        - composites
        - copylocks
        - lostcancel
        - nilfunc
        - shift
        - stdmethods
        - unreachable
        - unsafeptr
        - unusedresult
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1020"
        - "-ST1021"
        - "-QF1001"

  exclusions:
    paths:
      - vendor
      - third_party
    rules:
      # Test files: the deferred-Close teardown idiom and httptest
      # fixtures make these linters noisy without catching real bugs.
      - path: _test\.go$
        linters:
          - gosec
          - bodyclose
          - noctx
          - exhaustive
          - errcheck
          - forbidigo
      # cmd/* main.go bootstrap: probe HTTP calls are short-lived.
      - path: cmd/.+/main\.go$
        linters:
          - noctx
          - bodyclose
      # Connector packages (added in Session 1B) use snake_case slugs as
      # their package name to stay aligned with the registry key. Suppress
      # only the package-name underscore lint there.
      - path: internal/services/access/connectors/
        text: "ST1003: should not use underscores in package names"
        linters:
          - staticcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      colors: true
