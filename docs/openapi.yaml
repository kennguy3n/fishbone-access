openapi: 3.0.3
info:
  title: ShieldNet Access — Lifecycle & Policy API
  version: "1.0.0"
  description: |
    The lifecycle and policy surface of the ShieldNet Access control plane: access-request
    lifecycle, policy draft/simulate/promote, access-review campaigns, JML/SCIM
    automation, orphan reconciliation, grant expiry, and SSO enforcement status.

    ## Authentication & tenancy
    Every `/api/v1` route requires a Bearer access token issued by **iam-core**
    (validated against `${IAM_CORE_ISSUER}/oauth2/jwks`). Tenancy is derived
    **solely** from the token's `tenant_id` claim:

      * A token with no `tenant_id` claim is rejected `403` (fail-closed).
      * `X-Tenant-ID`, when supplied, is advisory and MUST equal the claim,
        otherwise `403`. It is never a fallback when the claim is absent.

    The resolved tenant is mapped to a workspace UUID and every query is scoped
    by it; a tenant with no provisioned workspace receives `403`, never an
    unscoped result. Mutating policy promotion additionally requires a
    step-up-MFA-satisfied token (`403` otherwise).
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: access-requests
  - name: grants
  - name: policies
  - name: packs
  - name: access-reviews
  - name: jml
  - name: orphans
  - name: sso
  - name: connectors
  - name: pam
paths:
  /me:
    get:
      summary: Echo the resolved identity and tenant
      responses:
        "200": { description: Identity/tenant echo }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /access-requests:
    post:
      tags: [access-requests]
      summary: Create an access request
      description: |
        Creates a request in `requested` state, then runs risk-based workflow
        routing: `low` auto-approves, `medium` parks for manager approval,
        `high`/sensitive parks for security review.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAccessRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  request: { $ref: "#/components/schemas/AccessRequest" }
                  risk: { $ref: "#/components/schemas/AccessRiskVerdict" }
                  workflow: { $ref: "#/components/schemas/WorkflowDecision" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [access-requests]
      summary: List access requests in the caller's workspace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items: { $ref: "#/components/schemas/AccessRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /access-requests/{id}:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    get:
      tags: [access-requests]
      summary: Get an access request
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  request: { $ref: "#/components/schemas/AccessRequest" }
                  risk: { $ref: "#/components/schemas/AccessRiskVerdict" }
                  anomalies:
                    type: array
                    items: { $ref: "#/components/schemas/AccessRequestAnomalyFlag" }
        "404": { $ref: "#/components/responses/NotFound" }

  /access-requests/{id}/history:
    parameters:
      - $ref: "#/components/parameters/IDPath"
    get:
      tags: [access-requests]
      summary: Get the state-transition history of a request
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items: { $ref: "#/components/schemas/StateHistoryEntry" }
        "404": { $ref: "#/components/responses/NotFound" }

  /access-requests/{id}/approve:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [access-requests]
      summary: Approve a request
      description: |
        Approves a request. A high-risk verdict gates approval behind step-up
        MFA (fail-CLOSED): without a satisfied MFA claim on the token the call
        is rejected with 403, regardless of request body.
      requestBody: { $ref: "#/components/requestBodies/Decision" }
      responses:
        "200": { $ref: "#/components/responses/RequestEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /access-requests/{id}/deny:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [access-requests]
      summary: Deny a request
      requestBody: { $ref: "#/components/requestBodies/Decision" }
      responses:
        "200": { $ref: "#/components/responses/RequestEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /access-requests/{id}/cancel:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [access-requests]
      summary: Cancel a request
      requestBody: { $ref: "#/components/requestBodies/Decision" }
      responses:
        "200": { $ref: "#/components/responses/RequestEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /access-requests/{id}/provision:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [access-requests]
      summary: Provision an approved request
      description: Orchestrates ProvisionAccess against the connector with retry/backoff, creating an active grant.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant: { $ref: "#/components/schemas/AccessGrant" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /grants/{id}/revoke:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [grants]
      summary: Revoke a grant (idempotent)
      requestBody: { $ref: "#/components/requestBodies/Decision" }
      responses:
        "200": { description: Revoked }
        "404": { $ref: "#/components/responses/NotFound" }

  /grants/expiry-enforce:
    post:
      tags: [grants]
      summary: Run the expiry sweep for the caller's workspace now
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result: { $ref: "#/components/schemas/EnforceResult" }

  /policies:
    post:
      tags: [policies]
      summary: Create a draft policy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PolicyInput" }
      responses:
        "201": { $ref: "#/components/responses/PolicyEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
    get:
      tags: [policies]
      summary: List policies
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items: { $ref: "#/components/schemas/Policy" }

  /policies/{id}:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [policies]
      summary: Get a policy
      responses:
        "200": { $ref: "#/components/responses/PolicyEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [policies]
      summary: Update a draft policy (drafts only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PolicyInput" }
      responses:
        "200": { $ref: "#/components/responses/PolicyEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /policies/{id}/simulate:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [policies]
      summary: Simulate a policy (ImpactResolver + ConflictDetector)
      description: Read-only pre-check; never touches the data plane.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation: { $ref: "#/components/schemas/SimulationResult" }
        "404": { $ref: "#/components/responses/NotFound" }

  /policies/{id}/promote:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [policies]
      summary: Promote a draft to active (idempotent, step-up MFA required)
      description: >
        Enforces test-before-rollout. The draft must have been simulated since
        its last edit (otherwise 409 ErrPolicyNotSimulated), and must have no
        unresolved grant-vs-deny conflicts with live policies (otherwise 409
        with a conflicts array). A reviewed conflict can be overridden by
        sending {"force": true, "reason": "..."}; the reason is recorded in the
        audit chain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Override an unresolved grant-vs-deny conflict block.
                reason:
                  type: string
                  description: >
                    Audited justification for the override. Required (non-empty)
                    when force is true — a forced promotion with a blank reason
                    is rejected with 400 ErrValidation.
      responses:
        "200": { $ref: "#/components/responses/PolicyEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: >
            Not promotable — the draft has not been simulated, or has unresolved
            grant-vs-deny conflicts (the response carries a conflicts array).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  conflicts:
                    type: array
                    items: { $ref: "#/components/schemas/PolicyConflict" }

  /policies/{id}/archive:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [policies]
      summary: Archive a policy (idempotent)
      responses:
        "200": { $ref: "#/components/responses/PolicyEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /packs:
    get:
      tags: [packs]
      summary: List curated policy packs
      description: >
        Returns the curated catalog of policy packs (compliance frameworks and
        regional data-protection regimes). Optional filters narrow the result;
        region/framework/industry match case-insensitively, and industry also
        matches packs tagged "any".
      parameters:
        - in: query
          name: tier
          schema: { type: integer, enum: [1, 2, 3] }
          description: 1 = global compliance, 2 = South-East Asia, 3 = rest of world.
        - in: query
          name: region
          schema: { type: string }
        - in: query
          name: industry
          schema: { type: string }
        - in: query
          name: framework
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  packs:
                    type: array
                    items: { $ref: "#/components/schemas/Pack" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /packs/{id}:
    parameters: [ { $ref: "#/components/parameters/PackIDPath" } ]
    get:
      tags: [packs]
      summary: Get a single pack by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  pack: { $ref: "#/components/schemas/Pack" }
        "404": { $ref: "#/components/responses/NotFound" }

  /packs/{id}/apply:
    parameters: [ { $ref: "#/components/parameters/PackIDPath" } ]
    post:
      tags: [packs]
      summary: Apply a pack — materialize its templates as DRAFT policies
      description: >
        Creates one draft policy per selected template in the caller's
        workspace, via the same lifecycle CreatePolicy path the editor uses, so
        every materialized rule inherits the test-before-rollout guarantee
        (each must still be simulated and promoted before it can take effect).
        Omit template_keys (or send an empty array) to apply the whole pack.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                template_keys:
                  type: array
                  items: { type: string }
                  description: Subset of template keys to apply; absent/empty = all.
      responses:
        "201":
          description: Drafts created
          content:
            application/json:
              schema:
                type: object
                properties:
                  applied:
                    type: array
                    items: { $ref: "#/components/schemas/AppliedPolicy" }
                  count: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /access-reviews:
    post:
      tags: [access-reviews]
      summary: Start an access-review campaign
      description: Snapshots every active grant in the workspace into review items.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  review: { $ref: "#/components/schemas/AccessReview" }
                  item_count: { type: integer }

  /access-reviews/{id}:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [access-reviews]
      summary: Get a campaign report
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  report: { $ref: "#/components/schemas/ReviewReport" }
        "404": { $ref: "#/components/responses/NotFound" }

  /access-reviews/{id}/items:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [access-reviews]
      summary: List campaign items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ReviewItem" }
        "404": { $ref: "#/components/responses/NotFound" }

  /access-reviews/{id}/items/{itemID}/decision:
    parameters:
      - $ref: "#/components/parameters/IDPath"
      - name: itemID
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [access-reviews]
      summary: Record a per-item decision (certify | revoke | escalate)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [certify, revoke, escalate]
                reason: { type: string }
      responses:
        "200": { description: Recorded }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /access-reviews/{id}/complete:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [access-reviews]
      summary: Complete a campaign and return the final report
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  report: { $ref: "#/components/schemas/ReviewReport" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /scim/events:
    post:
      tags: [jml]
      summary: Inbound SCIM event (Joiner/Mover/Leaver automation)
      description: |
        Classifies the event into a J/M/L lane. Leaver runs the six-layer kill
        switch (grant revoke → team remove → iam-core disable → session revoke →
        SCIM deprovision → identity disable); a failed layer is recorded and the
        cascade continues.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SCIMEvent" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lane: { type: string, enum: [joiner, mover, leaver] }
                  leaver:
                    allOf: [ { $ref: "#/components/schemas/LeaverResult" } ]
                    description: Six-layer kill-switch breakdown; present only for the leaver lane.
        "400": { $ref: "#/components/responses/BadRequest" }
        "500":
          description: |
            A leaver kill switch that completed but had one or more layers fail.
            The body carries the per-layer breakdown so an operator can act on it.
          content:
            application/json:
              schema:
                type: object
                properties:
                  lane: { type: string, enum: [leaver] }
                  error: { type: string }
                  leaver: { $ref: "#/components/schemas/LeaverResult" }

  /workflows:
    post:
      tags: [jml]
      summary: Create a draft JML workflow
      description: >
        Persists a new no-code Joiner/Mover/Leaver workflow as a draft
        (version 1). The definition is validated; a malformed document is
        rejected so it can never be simulated, published, or executed.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkflowInput" }
      responses:
        "201": { $ref: "#/components/responses/WorkflowEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
    get:
      tags: [jml]
      summary: List workflows
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items: { $ref: "#/components/schemas/Workflow" }

  /workflows/{id}:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [jml]
      summary: Get a workflow
      responses:
        "200": { $ref: "#/components/responses/WorkflowEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [jml]
      summary: Update a draft workflow (drafts only)
      description: >
        Replaces a draft's definition and clears the cached simulation, which
        re-locks the publish gate (the draft must be re-simulated after any
        edit). Only drafts are editable.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkflowInput" }
      responses:
        "200": { $ref: "#/components/responses/WorkflowEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /workflows/{id}/simulate:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [jml]
      summary: Dry-run a workflow for a sample identity (no side effects)
      description: >
        Runs the workflow's current definition against a sample subject WITHOUT
        any side effects and returns the ordered "what would happen" plan. For a
        draft it caches the result, which unlocks the publish gate
        (test-before-publish).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkflowSubject" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation: { $ref: "#/components/schemas/WorkflowRunResult" }
        "404": { $ref: "#/components/responses/NotFound" }

  /workflows/{id}/publish:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [jml]
      summary: Publish a draft workflow (idempotent, step-up MFA required)
      description: >
        Enforces test-before-publish: the draft must have been simulated since
        its last edit (otherwise 409), and that dry-run must not have reported
        failures. Only a published workflow is executed by the engine.
      responses:
        "200": { $ref: "#/components/responses/WorkflowEnvelope" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /workflows/{id}/archive:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [jml]
      summary: Archive a workflow (idempotent)
      responses:
        "200": { $ref: "#/components/responses/WorkflowEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /workflows/{id}/run:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [jml]
      summary: Run a published workflow live for a subject (step-up MFA required)
      description: >
        Executes a published workflow for the given subject, performing real
        side effects, appending per-step audit, and persisting a run record. A
        draft or archived workflow cannot run (409).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkflowSubject" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  run: { $ref: "#/components/schemas/WorkflowRunResult" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500":
          description: >
            The run completed but one or more steps failed; the body carries the
            per-step breakdown so an operator can act on it.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run: { $ref: "#/components/schemas/WorkflowRunResult" }

  /workflow-runs:
    get:
      tags: [jml]
      summary: List recent workflow runs (JML dashboard)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: "#/components/schemas/WorkflowRun" }

  /workflow-runs/{id}:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [jml]
      summary: Get one workflow run (per-step audit view)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  run: { $ref: "#/components/schemas/WorkflowRun" }
        "404": { $ref: "#/components/responses/NotFound" }

  /emergency-offboard:
    post:
      tags: [jml]
      summary: Standalone six-layer leaver kill switch (step-up MFA required)
      description: >
        Runs the six-layer leaver kill switch for a single identity as an
        emergency offboard, independent of any workflow. Gated by step-up MFA
        and audited. Returns the per-layer breakdown; a partial failure is a 500
        carrying the same breakdown so an operator can act on it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_external_id]
              properties:
                user_external_id: { type: string }
                reason: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaver: { $ref: "#/components/schemas/LeaverResult" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500":
          description: One or more kill-switch layers failed; body carries the breakdown.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  leaver: { $ref: "#/components/schemas/LeaverResult" }

  /connectors/{connectorID}/orphan-scan:
    parameters: [ { $ref: "#/components/parameters/ConnectorIDPath" } ]
    post:
      tags: [orphans]
      summary: Scan a connector for orphan accounts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan: { $ref: "#/components/schemas/ScanResult" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /orphan-accounts:
    get:
      tags: [orphans]
      summary: List recorded orphan accounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orphans:
                    type: array
                    items: { $ref: "#/components/schemas/OrphanAccount" }

  /orphan-accounts/{id}/disposition:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [orphans]
      summary: Set an orphan's operator disposition (ignore | disable)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [disposition]
              properties:
                disposition: { type: string, enum: [ignore, disable] }
      responses:
        "200": { description: Updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /connectors/{connectorID}/sso-status:
    parameters: [ { $ref: "#/components/parameters/ConnectorIDPath" } ]
    get:
      tags: [sso]
      summary: Report whether SSO is enforced for a connector
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sso: { $ref: "#/components/schemas/SSOStatus" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /connectors:
    get:
      tags: [connectors]
      summary: Capability-matrix catalogue of every connector the binary ships
      description: >
        Returns one entry per registered connector — its curated metadata, the
        five user-facing capability flags, and the type-asserted operational
        capability flags — enriched with whether the calling workspace has
        already connected the provider. Filters are ANDed.
      parameters:
        - { name: capability, in: query, required: false, schema: { type: string } }
        - { name: tier, in: query, required: false, schema: { type: string } }
        - { name: category, in: query, required: false, schema: { type: string } }
        - name: connected
          in: query
          required: false
          description: >
            Tri-state filter on per-workspace connection state. Omitted returns
            all providers; true returns only providers the workspace has already
            connected; false returns only those it has not.
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  connectors:
                    type: array
                    items: { $ref: "#/components/schemas/ConnectorCatalogueEntry" }
        "400": { $ref: "#/components/responses/BadRequest" }
    post:
      tags: [connectors]
      summary: Create a connector instance for the workspace
      description: >
        Validates the configuration against the provider connector (offline),
        seals the secrets under the workspace DEK, and persists a pending row.
        Call /connectors/{connectorID}/test to verify credentials live.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider: { type: string }
                display_name: { type: string }
                config: { type: object, additionalProperties: true }
                secrets: { type: object, additionalProperties: true }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccessConnector" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/Unprocessable" }

  /connectors/catalogue/facets:
    get:
      tags: [connectors]
      summary: Distinct filter vocabularies for the catalogue UI
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogueFacets" }

  /connectors/catalogue/{provider}:
    parameters: [ { $ref: "#/components/parameters/ProviderPath" } ]
    get:
      tags: [connectors]
      summary: Capability descriptor for one provider, with workspace state
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorCatalogueEntry" }
        "404": { $ref: "#/components/responses/NotFound" }

  /connectors/catalogue/{provider}/setup-wizard:
    parameters: [ { $ref: "#/components/parameters/ProviderPath" } ]
    post:
      tags: [connectors]
      summary: AI-assisted setup plan for a provider (advisory, fail-OPEN)
      description: >
        Consults the access-ai-agent connector_setup_assistant skill for a
        guided, step-by-step setup plan. Fail-OPEN: a model outage yields a
        degraded manual plan (HTTP 200, plan.degraded=true), never a 5xx. The
        suggestion and its rationale are persisted to a workspace-scoped audit
        trail.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_intent: { type: string }
                connector_id: { type: string, format: uuid }
      responses:
        "200":
          description: OK (plan may be degraded when the model is unavailable)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnectorSetupResult" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /connectors/{connectorID}:
    parameters: [ { $ref: "#/components/parameters/ConnectorIDPath" } ]
    get:
      tags: [connectors]
      summary: Get a connector instance by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccessConnector" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [connectors]
      summary: Disconnect (soft-delete) a connector, clearing its sealed secrets
      responses:
        "204": { description: Disconnected }
        "404": { $ref: "#/components/responses/NotFound" }

  /connectors/{connectorID}/test:
    parameters: [ { $ref: "#/components/parameters/ConnectorIDPath" } ]
    post:
      tags: [connectors]
      summary: Test live connectivity (and optionally probe capabilities)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                capabilities:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Connection succeeded (missing lists any unmet capabilities)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  missing: { type: array, items: { type: string } }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Connectivity failed (credentials rejected or provider unreachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  error: { type: string }
                  missing: { type: array, items: { type: string } }

  /connectors/{connectorID}/sync:
    parameters: [ { $ref: "#/components/parameters/ConnectorIDPath" } ]
    post:
      tags: [connectors]
      summary: Enqueue an identity-sync job for the connector
      responses:
        "202":
          description: Accepted (job enqueued)
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /pam/targets:
    get:
      tags: [pam]
      summary: List PAM targets in the caller's workspace
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  targets:
                    type: array
                    items: { $ref: "#/components/schemas/PAMTarget" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [pam]
      summary: Register a PAM target
      description: |
        Registers a privileged system the gateway proxies. The supplied secret
        is sealed (AES-256-GCM) at rest and only ever decrypted into a live,
        lease-authorized session — it is never returned by the API.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePAMTarget" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PAMTarget" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /pam/leases:
    get:
      tags: [pam]
      summary: List JIT leases in the caller's workspace
      parameters:
        - { name: target_id, in: query, schema: { type: string, format: uuid } }
        - { name: subject, in: query, schema: { type: string } }
        - { name: active_only, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  leases:
                    type: array
                    items: { $ref: "#/components/schemas/PAMLease" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [pam]
      summary: Request a JIT lease
      description: |
        Opens a lease in `requested` state. An AI risk assessment is computed at
        request time (advisory, fail-open) and persisted for audit. The lease
        must be approved before the credential broker will mint a connect token.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestPAMLease" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PAMLease" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /pam/leases/{id}:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [pam]
      summary: Get a JIT lease
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PAMLease" }
        "404": { $ref: "#/components/responses/NotFound" }

  /pam/leases/{id}/approve:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [pam]
      summary: Approve a JIT lease
      description: |
        Grants the requested (or overridden) TTL window. The transition is
        appended to the workspace audit hash chain. Only a `requested` lease can
        be approved. Requires step-up MFA (a token without satisfied MFA is
        rejected with 403).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                duration_override_seconds: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PAMLease" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /pam/leases/{id}/revoke:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [pam]
      summary: Revoke a JIT lease
      description: |
        Kills a lease early (terminal). Any session still running on the lease
        is torn down and the credential can no longer be brokered. Requires
        step-up MFA (a token without satisfied MFA is rejected with 403).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PAMLease" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /pam/leases/expire:
    post:
      tags: [pam]
      summary: Sweep and expire leases past their TTL
      description: |
        Idempotently claims and audits every live lease whose TTL has elapsed,
        tearing down any sessions still bound to them. Safe to call repeatedly.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  expired: { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /pam/sessions:
    get:
      tags: [pam]
      summary: List privileged sessions in the caller's workspace
      parameters:
        - { name: target_id, in: query, schema: { type: string, format: uuid } }
        - { name: subject, in: query, schema: { type: string } }
        - { name: active_only, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { $ref: "#/components/schemas/PAMSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /pam/sessions/{id}:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [pam]
      summary: Get a privileged session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PAMSession" }
        "404": { $ref: "#/components/responses/NotFound" }

  /pam/sessions/{id}/replay:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    get:
      tags: [pam]
      summary: Retrieve a session's recorded replay
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplayResponse" }
        "404": { $ref: "#/components/responses/NotFound" }

  /pam/sessions/{id}/pause:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [pam]
      summary: Pause a live privileged session
      description: |
        Soft-pauses the operator→target byte flow (reversible). Requires the
        `pam.takeover` permission and step-up MFA (fail-closed).
      responses:
        "200": { description: Paused }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /pam/sessions/{id}/resume:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [pam]
      summary: Resume a paused privileged session
      description: |
        Releases a soft-pause. Requires the `pam.takeover` permission and
        step-up MFA (fail-closed).
      responses:
        "200": { description: Resumed }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /pam/sessions/{id}/terminate:
    parameters: [ { $ref: "#/components/parameters/IDPath" } ]
    post:
      tags: [pam]
      summary: Terminate a live privileged session
      description: |
        Force-closes the session and tears down the proxy. Requires the
        `pam.takeover` permission and step-up MFA (fail-closed); the action is
        audited with the operator identity.
      responses:
        "200": { description: Terminated }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IDPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ConnectorIDPath:
      name: connectorID
      in: path
      required: true
      schema: { type: string, format: uuid }
    PackIDPath:
      name: id
      in: path
      required: true
      description: Pack identifier. A human-readable catalog slug (e.g. "pci-dss-v4"), not a UUID.
      schema: { type: string }
    ProviderPath:
      name: provider
      in: path
      required: true
      description: Connector provider key (e.g. "microsoft", "google-oauth2"), not a UUID.
      schema: { type: string }
  requestBodies:
    Decision:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              reason: { type: string }
  responses:
    RequestEnvelope:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              request: { $ref: "#/components/schemas/AccessRequest" }
    PolicyEnvelope:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              policy: { $ref: "#/components/schemas/Policy" }
    WorkflowEnvelope:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              workflow: { $ref: "#/components/schemas/Workflow" }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: No tenant/workspace resolved, tenant mismatch, or step-up MFA required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found in the caller's workspace
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Illegal state transition or closed resource
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unprocessable:
      description: Connector not configured/resolvable
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    CreateAccessRequest:
      type: object
      required: [resource_ref, role]
      properties:
        target_user_id: { type: string }
        connector_id: { type: string, format: uuid, nullable: true }
        resource_ref: { type: string }
        role: { type: string }
        justification: { type: string }
        risk_level: { type: string, enum: [low, medium, high] }
        risk_factors:
          type: array
          items: { type: string }
        resource_tags:
          type: array
          items: { type: string }
        duration_hours: { type: integer, minimum: 1 }
    AccessRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        requester_id: { type: string }
        target_user_id: { type: string }
        connector_id: { type: string, format: uuid, nullable: true }
        resource_ref: { type: string }
        role: { type: string }
        justification: { type: string }
        risk_level: { type: string }
        state:
          type: string
          enum: [requested, ai_reviewed, approved, denied, cancelled, provisioning, provisioned, active, provision_failed, revoked, expired]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    StateHistoryEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        request_id: { type: string, format: uuid }
        from_state: { type: string }
        to_state: { type: string }
        actor: { type: string }
        reason: { type: string }
        created_at: { type: string, format: date-time }
    WorkflowDecision:
      type: object
      properties:
        step_type: { type: string, enum: [auto_approve, manager_approval, security_review] }
        reason: { type: string }
        approved: { type: boolean }
    AccessRiskVerdict:
      type: object
      description: |
        Immutable, workspace-scoped AI risk assessment persisted against a
        request for audit. `degraded` is true when the AI agent was unreachable
        and the fail-open fallback supplied the verdict (never auto-approve).
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        request_id: { type: string, format: uuid }
        score: { type: string, enum: [low, medium, high] }
        recommendation: { type: string, enum: [auto_approve_eligible, needs_review, high_risk] }
        factors:
          type: array
          items: { type: string }
        rationale: { type: string }
        inputs: { type: object, additionalProperties: true }
        source: { type: string }
        degraded: { type: boolean }
        created_at: { type: string, format: date-time }
    AccessRequestAnomalyFlag:
      type: object
      description: |
        Advisory anomaly observation surfaced by the anomaly-detection skill on
        an approved elevation. Never changes the FSM state.
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        request_id: { type: string, format: uuid }
        grant_id: { type: string, format: uuid, nullable: true }
        kind: { type: string }
        severity: { type: string }
        reason: { type: string }
        confidence: { type: number }
        created_at: { type: string, format: date-time }
    AccessGrant:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        request_id: { type: string, format: uuid }
        connector_id: { type: string, format: uuid, nullable: true }
        iam_core_user_id: { type: string }
        resource_ref: { type: string }
        role: { type: string }
        state: { type: string, enum: [active, revoked, expired] }
        expires_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
    PolicyInput:
      type: object
      required: [name, definition]
      properties:
        name: { type: string }
        definition:
          type: object
          description: Opaque policy definition document (validated for parseability).
    Policy:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        version: { type: integer }
        state: { type: string, enum: [draft, active, archived] }
        definition: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PackTemplate:
      type: object
      properties:
        key: { type: string }
        name: { type: string }
        summary: { type: string }
        action: { type: string, enum: [grant, deny] }
        subjects: { type: array, items: { type: string } }
        resources: { type: array, items: { type: string } }
        role: { type: string }
        control:
          type: string
          description: Compliance control reference (e.g. "PCI-DSS 7.2").
    Pack:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        authority:
          type: string
          description: Issuing/standards body (e.g. "PCI Security Standards Council").
        description: { type: string }
        tier: { type: integer, enum: [1, 2, 3] }
        regions: { type: array, items: { type: string } }
        industries: { type: array, items: { type: string } }
        frameworks: { type: array, items: { type: string } }
        templates:
          type: array
          items: { $ref: "#/components/schemas/PackTemplate" }
    AppliedPolicy:
      type: object
      properties:
        template_key: { type: string }
        policy: { $ref: "#/components/schemas/Policy" }
    SimulationResult:
      type: object
      properties:
        impact: { $ref: "#/components/schemas/ImpactReport" }
        conflicts:
          type: array
          items: { $ref: "#/components/schemas/PolicyConflict" }
    ImpactReport:
      type: object
      properties:
        action: { type: string }
        subject_count: { type: integer }
        resource_count: { type: integer }
        pair_count: { type: integer }
        new_grant_pairs: { type: integer }
        redundant_pairs: { type: integer }
        wildcard_resource: { type: boolean }
        affected_grants: { type: integer }
        affected_subjects:
          type: array
          items: { type: string }
        affected_resources:
          type: array
          items: { type: string }
    PolicyConflict:
      type: object
      properties:
        kind: { type: string }
        other_policy_id: { type: string, format: uuid }
        other_policy_name: { type: string }
        other_policy_state: { type: string }
        subject: { type: string }
        resource: { type: string }
    AccessReview:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        state: { type: string, enum: [active, completed] }
        created_at: { type: string, format: date-time }
    ReviewItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        review_id: { type: string, format: uuid }
        grant_id: { type: string, format: uuid }
        decision: { type: string, enum: [pending, certify, revoke, escalate] }
        decided_by: { type: string }
        reason: { type: string }
    ReviewReport:
      type: object
      properties:
        review_id: { type: string, format: uuid }
        name: { type: string }
        state: { type: string }
        total: { type: integer }
        pending: { type: integer }
        certified: { type: integer }
        revoked: { type: integer }
        escalated: { type: integer }
    SCIMEvent:
      type: object
      required: [method, user_external_id]
      properties:
        method: { type: string, enum: [POST, PUT, PATCH, DELETE] }
        user_external_id: { type: string }
        active: { type: boolean, nullable: true }
        email: { type: string }
        display_name: { type: string }
        groups_changed: { type: boolean }
        resource_ref: { type: string }
        role: { type: string }
        connector_id: { type: string, format: uuid, nullable: true }
    LeaverResult:
      type: object
      description: Aggregated outcome of the six-layer leaver kill switch.
      properties:
        user_external_id: { type: string }
        errored:
          type: boolean
          description: True if any layer failed; every layer is still attempted.
        layers:
          type: array
          items:
            type: object
            properties:
              layer:
                type: string
                enum: [grant_revoke, team_remove, iam_core_disable, session_revoke, scim_deprovision, identity_disable]
              status: { type: string, enum: [done, skipped, failed] }
              detail: { type: string }
    WorkflowStep:
      type: object
      required: [type]
      description: >
        One ordered action. Fields are a strongly-typed superset across step
        types; the per-type required fields are enforced server-side.
      properties:
        type:
          type: string
          enum: [grant_role, provision_connector, request_approval, notify, start_access_review, run_kill_switch]
        name: { type: string }
        connector_id: { type: string, format: uuid }
        resource_ref: { type: string }
        role: { type: string }
        approver_role: { type: string }
        channel: { type: string }
        message: { type: string }
        review_name: { type: string }
    WorkflowCondition:
      type: object
      required: [attribute, operator, values]
      description: One ANDed attribute predicate gating which identities the workflow acts on.
      properties:
        attribute: { type: string }
        operator: { type: string, enum: [eq, neq, in, contains, not_contains] }
        values:
          type: array
          items: { type: string }
    WorkflowDefinition:
      type: object
      required: [kind, trigger, steps]
      properties:
        kind: { type: string, enum: [joiner, mover, leaver] }
        trigger: { type: string, enum: [identity_event, schedule, manual] }
        conditions:
          type: array
          items: { $ref: "#/components/schemas/WorkflowCondition" }
        steps:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WorkflowStep" }
    WorkflowInput:
      type: object
      required: [name, definition]
      properties:
        name: { type: string }
        definition: { $ref: "#/components/schemas/WorkflowDefinition" }
    WorkflowSubject:
      type: object
      required: [external_id]
      description: The identity (real for a live run, sample for a dry-run) a workflow targets.
      properties:
        external_id: { type: string }
        email: { type: string }
        display_name: { type: string }
        department: { type: string }
        groups:
          type: array
          items: { type: string }
        attributes:
          type: object
          additionalProperties: { type: string }
    Workflow:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        trigger: { type: string, enum: [identity_event, schedule, manual] }
        state: { type: string, enum: [draft, published, archived] }
        version: { type: integer }
        definition: { $ref: "#/components/schemas/WorkflowDefinition" }
        published_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    KillSwitchLayer:
      type: object
      description: One layer outcome of the six-layer kill switch surfaced in a run.
      properties:
        layer:
          type: string
          enum: [grant_revoke, team_remove, iam_core_disable, session_revoke, scim_deprovision, identity_disable]
        status: { type: string, enum: [planned, done, skipped, failed] }
        detail: { type: string }
    WorkflowStepOutcome:
      type: object
      properties:
        index: { type: integer }
        type: { type: string }
        name: { type: string }
        status: { type: string, enum: [planned, done, skipped, failed] }
        detail: { type: string }
        ref: { type: string }
        layers:
          type: array
          description: Present only for a run_kill_switch step.
          items: { $ref: "#/components/schemas/KillSwitchLayer" }
    WorkflowRunResult:
      type: object
      description: Outcome of a dry-run (planned) or live run.
      properties:
        mode: { type: string, enum: [dry_run, live] }
        matched: { type: boolean }
        status: { type: string, enum: [planned, succeeded, partial, failed, skipped] }
        subject: { $ref: "#/components/schemas/WorkflowSubject" }
        steps:
          type: array
          items: { $ref: "#/components/schemas/WorkflowStepOutcome" }
        run_id: { type: string, format: uuid, nullable: true }
    WorkflowRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        workflow_id: { type: string, format: uuid }
        workflow_version: { type: integer }
        trigger: { type: string }
        subject_external_id: { type: string }
        mode: { type: string, enum: [dry_run, live] }
        status: { type: string, enum: [planned, succeeded, partial, failed, skipped] }
        steps:
          type: array
          items: { $ref: "#/components/schemas/WorkflowStepOutcome" }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
    ScanResult:
      type: object
      properties:
        connector_id: { type: string, format: uuid }
        dry_run: { type: boolean }
        upstream_count: { type: integer }
        orphan_count: { type: integer }
        persisted_count: { type: integer }
        orphans:
          type: array
          items: { $ref: "#/components/schemas/OrphanCandidate" }
    OrphanCandidate:
      type: object
      properties:
        connector_id: { type: string, format: uuid }
        external_user_id: { type: string }
        display_name: { type: string }
    OrphanAccount:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        connector_id: { type: string, format: uuid }
        external_user_id: { type: string }
        display_name: { type: string }
        disposition: { type: string, enum: [pending, ignore, disable] }
        created_at: { type: string, format: date-time }
    EnforceResult:
      type: object
      properties:
        examined: { type: integer }
        expired: { type: integer }
        failed: { type: integer }
    SSOStatus:
      type: object
      properties:
        connector_id: { type: string, format: uuid }
        supported: { type: boolean }
        enforced: { type: boolean }
        details: { type: string }
    AccessConnector:
      type: object
      description: A workspace's connector instance. Secrets are never serialized.
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        provider: { type: string }
        display_name: { type: string }
        status: { type: string }
        config: { type: object, additionalProperties: true }
        last_synced_at: { type: string, format: date-time, nullable: true }
    UserFacingCapabilities:
      type: object
      properties:
        sync_identity: { type: boolean }
        provision_access: { type: boolean }
        list_entitlements: { type: boolean }
        get_access_log: { type: boolean }
        sso_federation: { type: boolean }
    OperationalCapabilities:
      type: object
      description: >
        Derived by type-asserting the registered connector against the optional
        Go interfaces, so they can never drift from the shipped binary.
      properties:
        group_sync: { type: boolean }
        identity_delta_sync: { type: boolean }
        access_audit_stream: { type: boolean }
        scim_provisioning: { type: boolean }
        session_revoke: { type: boolean }
        sso_enforcement_check: { type: boolean }
        credential_renewal: { type: boolean }
    ConnectorCatalogueEntry:
      type: object
      description: One row of the capability matrix, with workspace connection state.
      properties:
        provider: { type: string }
        display_name: { type: string }
        tier: { type: string, enum: [T1, T2, T3, T4, T5] }
        category: { type: string }
        registered: { type: boolean }
        user_facing: { $ref: "#/components/schemas/UserFacingCapabilities" }
        operational: { $ref: "#/components/schemas/OperationalCapabilities" }
        connected: { type: boolean }
        connector_id: { type: string }
        status: { type: string }
    CatalogueFacets:
      type: object
      properties:
        tiers: { type: array, items: { type: string } }
        categories: { type: array, items: { type: string } }
        user_facing_capabilities: { type: array, items: { type: string } }
        operational_capabilities: { type: array, items: { type: string } }
    ConnectorSetupFieldMapping:
      type: object
      properties:
        source: { type: string }
        target: { type: string }
        invert:
          type: boolean
          description: >
            True when the source boolean has opposite polarity to the target
            (e.g. Google `suspended` → platform `active`) and must be negated on
            sync. Absent for the common non-inverted mapping.
    ConnectorSetupStep:
      type: object
      properties:
        step: { type: integer }
        title: { type: string }
        description: { type: string }
        required_scopes:
          type: array
          items: { type: string }
          description: OAuth/API scopes the step requires. Omitted when empty (the server applies `omitempty`), so absence means "none for this step", not "unknown".
        field_mappings:
          type: array
          items: { $ref: "#/components/schemas/ConnectorSetupFieldMapping" }
          description: IdP-attribute → platform-field mappings for the step. Omitted when empty.
        common_pitfalls:
          type: array
          items: { type: string }
          description: Known gotchas for the step. Omitted when empty.
        estimated_minutes: { type: integer }
    ConnectorSetupPlan:
      type: object
      properties:
        strategy: { type: string }
        explanation: { type: string }
        steps:
          type: array
          items: { $ref: "#/components/schemas/ConnectorSetupStep" }
        model_used: { type: boolean }
        degraded:
          type: boolean
          description: True when the AI agent was unavailable and the plan is the deterministic manual fallback.
    ConnectorSetupResult:
      type: object
      properties:
        suggestion_id: { type: string, format: uuid }
        plan: { $ref: "#/components/schemas/ConnectorSetupPlan" }
    PAMTarget:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        protocol:
          type: string
          enum: [ssh, postgres, mysql, mssql, mongodb, redis, k8s-exec, rdp, vnc, http]
        address: { type: string }
        username: { type: string }
        require_mfa: { type: boolean }
        lease_ttl_seconds: { type: integer }
        secret_rotated_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreatePAMTarget:
      type: object
      required: [name, protocol, address]
      properties:
        name: { type: string }
        protocol:
          type: string
          enum: [ssh, postgres, mysql, mssql, mongodb, redis, k8s-exec, rdp, vnc, http]
        address: { type: string }
        username: { type: string }
        require_mfa: { type: boolean }
        lease_ttl_seconds: { type: integer }
        secret:
          type: object
          description: One of password, private_key, or token must be supplied. Never returned by the API.
          properties:
            username: { type: string }
            password: { type: string }
            private_key: { type: string }
            token: { type: string }
    PAMLease:
      type: object
      description: |
        A just-in-time grant of privileged access. The `state` field is the
        server-derived machine state; it is never stored, only computed from the
        (granted_at, activated_at, expires_at, revoked_at) tuple.
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        target_id: { type: string, format: uuid }
        subject: { type: string }
        requested_by: { type: string }
        reason: { type: string }
        request_id: { type: string, format: uuid, nullable: true }
        approved_by: { type: string }
        requested_ttl_seconds: { type: integer }
        risk_level: { type: string }
        risk_reason: { type: string }
        risk_degraded: { type: boolean }
        granted_at: { type: string, format: date-time, nullable: true }
        activated_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        expired_at: { type: string, format: date-time, nullable: true }
        revoked_at: { type: string, format: date-time, nullable: true }
        revoke_reason: { type: string }
        state:
          type: string
          enum: [requested, approved, active, expired, revoked]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    RequestPAMLease:
      type: object
      required: [target_id]
      properties:
        target_id: { type: string, format: uuid }
        subject: { type: string, description: Defaults to the calling subject when omitted. }
        ttl_seconds: { type: integer }
        reason: { type: string }
        request_id: { type: string, format: uuid }
    PAMSession:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        target_id: { type: string, format: uuid }
        subject: { type: string }
        protocol: { type: string }
        state: { type: string, enum: [active, ended, terminated] }
        client_addr: { type: string }
        replay_key: { type: string }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        terminated_by: { type: string }
        lease_id: { type: string, format: uuid, nullable: true }
        paused: { type: boolean }
        paused_by: { type: string }
        paused_at: { type: string, format: date-time, nullable: true }
    ReplayFrame:
      type: object
      properties:
        direction: { type: string, enum: [input, output, control] }
        at: { type: string, format: date-time }
        payload: { type: string, format: byte, description: Base64-encoded frame bytes. }
    ReplayResponse:
      type: object
      properties:
        session_id: { type: string, format: uuid }
        truncated: { type: boolean, description: True when the recording hit its size cap. }
        frames:
          type: array
          items: { $ref: "#/components/schemas/ReplayFrame" }
